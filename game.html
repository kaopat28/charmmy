<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Message</title>
<link rel="stylesheet" href="stylegame.css">
</head>

<body>

<div class="scene">

  <!-- background paper -->
  <div class="board">

    <h1 class="title">Find the Secret 💌</h1>

    <!-- hints -->
    <div class="hint hint1">⭐ the day we met</div>
    <div class="hint hint2">☁ our favorite place</div>
    <div class="hint hint3">📷 first memory</div>

    <!-- password box -->
    <div class="password-box">
      <input id="password"
             type="password"
             placeholder="enter the secret...">

      <button onclick="checkPassword()">unlock</button>
    </div>

  </div>

</div>

<!-- result overlay -->
<div id="success" class="success">
  <div class="message">
    You are my favorite memory ✨
    <br><br>
    Thank you for being in my life 💌
  </div>

  <button onclick="goBack()">← back</button>
</div>

<script src="game.js"></script>
</body>
</html>
