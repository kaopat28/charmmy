<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Message</title>
<link rel="stylesheet" href="stylegame.css">
</head>

<body>
  <div class="decorations">

  <!-- photos -->
  <img src="immage/wc3.jpg" class="photo p1">
  <img src="immage/wc6.JPG" class="photo p2">
  <img src="immage/wc5.JPG" class="photo p3">
  <img src="immage/wc1.JPG" class="photo p4">
 

  <!-- cute stickers -->
  <div class="sticker">🌸</div>
  
</div>


<div class="scene">

  <!-- background paper -->
  <div class="board">

    <h1 class="title">guess the password 💌</h1>

    <!-- hints -->
    <div class="hint hint1">⭐ felling</div>
    <div class="hint hint2">☁ kaopat -> charm</div>
    <div class="hint hint3">foreverr</div>

    <!-- password box -->
    <div class="password-box">
      <input id="password"
             type="password"
             placeholder="enter the secret...">

      <button onclick="checkPassword()">unlock</button>
    </div>

  </div>

</div>

<!-- result overlay -->
<div id="success" class="success">
  <div class="message">
    love you so muchh✨
    <br><br>
    ถึงจะไม่ได้เจอกันในชุดนักเรียนแล้ว แต่จะคิดถึงเสมออ ขอบคุณที่ทำให้ม.ปลายของกุ แล้วก็ม.3 มีความทรงจำดีๆเยอะขนาดนี้้  
  </div>

  <button onclick="goBack()">← back</button>
</div>

<script src="game.js"></script>
</body>
</html>
